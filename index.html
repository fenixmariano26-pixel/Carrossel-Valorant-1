<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant - Agentes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="image/Valorant_Logo.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="agente ativo" style="--bg: #0B1C2D">
            <div class="classe">INICIADOR</div>
            <img src="image/Fade_Artwork_Full.webp" alt="Agente Fade" class="personagem">
            <div class="nome">FADE</div>
        </div>

        <div class="agente " style="--bg: #2A1C3F">
            <div class="classe">SENTINELA</div>
            <img src="image/Vyse_Artwork_Full.webp" alt="Agente Vyse" class="personagem">
            <div class="nome">VYSE</div>
        </div>

        <div class="agente" style="--bg: #3A2F6E">
            <div class="classe">DUELISTA</div>
            <img src="image/Waylay_Artwork_Full.webp" alt="Agente Waylay" class="personagem">
            <div class="nome">WAYLAY</div>
        </div>

        <div class="agente" style="--bg: #0F2E1E">
            <div class="classe">CONTROLADOR</div>
            <img src="image/Viper_png.webp" alt="Agente Viper" class="personagem">
            <div class="nome">VIPER</div>
        </div>
        <div class="sentas">
            <button id="vir"><</button>
            <button id="ir">></button>
        </div>
    </main>
    
    <script src="js/script.js"></script>
</body>
</html>
